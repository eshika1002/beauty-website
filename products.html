<!DOCTYPE html>
<html>
<head>
    <title>Products</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Our Collection</h1>

<div class="products">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1586495777744-4413f21062fa">
        <h3>Luxury Lipstick</h3>
        <p>₹499</p>
        <button onclick="addToCart('Lipstick', 499)">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1596462502278-27bfdc403348">
        <h3>Face Cream</h3>
        <p>₹799</p>
        <button onclick="addToCart('Face Cream', 799)">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519">
        <h3>Perfume</h3>
        <p>₹999</p>
        <button onclick="addToCart('Perfume', 999)">Add to Cart</button>
    </div>

</div>

<script>
function addToCart(name, price) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    cart.push({name, price});
    localStorage.setItem("cart", JSON.stringify(cart));
    alert("Added to cart 🛒");
}
</script>

</body>
</html>
