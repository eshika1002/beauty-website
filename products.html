<!DOCTYPE html>
<html>
<head>
    <title>Products</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <div class="logo">GlowBeauty</div>
    <div>
        <a href="index.html">Home</a>
        <a href="products.html">Shop</a>
        <a href="cart.html">Cart 🛒</a>
    </div>
</nav>

<h1 class="heading">Our Collection</h1>

<div class="products">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1586495777744-4413f21062fa" alt="">
        <h3>Luxury Lipstick</h3>
        <p>₹499</p>
        <button onclick="addToCart('Lipstick',499)">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1596462502278-27bfdc403348" alt="">
        <h3>Face Cream</h3>
        <p>₹799</p>
        <button onclick="addToCart('Face Cream',799)">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1616394584738-fc6e612e71b9" alt="">
        <h3>Perfume</h3>
        <p>₹999</p>
        <button onclick="addToCart('Perfume',999)">Add to Cart</button>
    </div>

</div>

<script>
function addToCart(name, price) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    cart.push({name, price});
    localStorage.setItem("cart", JSON.stringify(cart));
    alert("Added to cart 🛒");
}
</script>

</body>
</html>
